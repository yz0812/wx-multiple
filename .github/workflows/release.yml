name: release-windows

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate tag and resolve build metadata
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(?<version>.+)$') {
            throw "Tag must match v<version>, current: $tag"
          }
          $tagVersion = $Matches.version

          $packageJson = Get-Content package.json -Raw | ConvertFrom-Json
          $tauriConfig = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $cargoToml = Get-Content src-tauri/Cargo.toml -Raw

          $cargoNameMatch = [regex]::Match($cargoToml, '(?m)^name\s*=\s*"([^"]+)"')
          $cargoVersionMatch = [regex]::Match($cargoToml, '(?m)^version\s*=\s*"([^"]+)"')

          if (-not $cargoNameMatch.Success -or -not $cargoVersionMatch.Success) {
            throw "Failed to read package name or version from src-tauri/Cargo.toml"
          }

          $packageName = $packageJson.name
          $packageVersion = $packageJson.version
          $tauriVersion = $tauriConfig.version
          $cargoVersion = $cargoVersionMatch.Groups[1].Value
          $binaryName = $cargoNameMatch.Groups[1].Value
          $assetPrefix = ($packageName -replace '[^0-9A-Za-z._-]', '-').Trim('-')

          if ($packageVersion -ne $tagVersion) {
            throw "package.json version ($packageVersion) does not match tag ($tagVersion)"
          }
          if ($tauriVersion -ne $tagVersion) {
            throw "src-tauri/tauri.conf.json version ($tauriVersion) does not match tag ($tagVersion)"
          }
          if ($cargoVersion -ne $tagVersion) {
            throw "src-tauri/Cargo.toml version ($cargoVersion) does not match tag ($tagVersion)"
          }
          if ([string]::IsNullOrWhiteSpace($assetPrefix)) {
            throw "Resolved asset prefix is empty"
          }

          Add-Content -Path $env:GITHUB_ENV -Value "APP_VERSION=$tagVersion"
          Add-Content -Path $env:GITHUB_ENV -Value "BINARY_NAME=$binaryName"
          Add-Content -Path $env:GITHUB_ENV -Value "ASSET_PREFIX=$assetPrefix"

      - name: Build Tauri app
        run: npm run tauri build

      - name: Create portable zip
        shell: pwsh
        run: |
          $exePath = Join-Path $PWD "src-tauri/target/release/$env:BINARY_NAME.exe"
          if (-not (Test-Path $exePath)) {
            throw "Portable executable not found: $exePath"
          }

          $portableDir = Join-Path $env:RUNNER_TEMP 'portable'
          if (Test-Path $portableDir) {
            Remove-Item $portableDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $portableDir | Out-Null

          Copy-Item $exePath (Join-Path $portableDir "$env:ASSET_PREFIX.exe") -Force

          $portableZip = Join-Path $env:RUNNER_TEMP "$env:ASSET_PREFIX`_$env:APP_VERSION`_windows_portable.zip"
          if (Test-Path $portableZip) {
            Remove-Item $portableZip -Force
          }

          Compress-Archive -Path (Join-Path $portableDir '*') -DestinationPath $portableZip -Force
          Add-Content -Path $env:GITHUB_ENV -Value "PORTABLE_ZIP=$portableZip"

      - name: Create GitHub release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $bundleDir = Join-Path $PWD 'src-tauri/target/release/bundle'
          if (-not (Test-Path $bundleDir)) {
            throw "Bundle directory not found: $bundleDir"
          }

          $bundleAssets = @(Get-ChildItem $bundleDir -Recurse -File | Where-Object { $_.Extension -in '.exe', '.msi' } | Select-Object -ExpandProperty FullName)
          if ($bundleAssets.Count -eq 0) {
            throw "No installer assets found in $bundleDir"
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Automated release for $tag."
          }

          $assets = @($env:PORTABLE_ZIP) + $bundleAssets
          & gh release upload $tag $assets --clobber
